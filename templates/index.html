<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenie | Smart Tutor</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 40px 20px; margin: 0; }
        .container { max-width: 800px; margin: auto; }
        h1 { color: #ffffff; text-align: center; }
        .feature-box { background: #1e1e1e; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        label { font-weight: bold; color: #bb86fc; display: block; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; background: #2c2c2c; border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; }
        button { background: #bb86fc; color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #9965f4; }
        .output { margin-top: 15px; padding: 15px; background: #000; border-radius: 6px; display: none; border-left: 4px solid #bb86fc; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to EduGenie 🧠✨</h1>
    <p style="text-align: center;">Your personal AI tutor for learning support!</p>

    <!-- Q&A -->
    <div class="feature-box">
        <label>Ask EduGenie a Question:</label>
        <input type="text" id="question" placeholder="E.g., Why is the sky blue?" onkeypress="if(event.key==='Enter') handleFormSubmit('/qa?question=', 'question', 'qaResult', 'answer', 'GET')">
        <button onclick="handleFormSubmit('/qa?question=', 'question', 'qaResult', 'answer', 'GET')">Get Answer</button>
        <div id="qaResult" class="output"></div>
    </div>

    <!-- Explanation -->
    <div class="feature-box">
        <label>Need an Explanation?</label>
        <input type="text" id="topic" placeholder="E.g., Photosynthesis" onkeypress="if(event.key==='Enter') handleFormSubmit('/explain/', 'topic', 'explanationResult', 'explanation', 'POST', 'topic')">
        <button onclick="handleFormSubmit('/explain/', 'topic', 'explanationResult', 'explanation', 'POST', 'topic')">Explain</button>
        <div id="explanationResult" class="output"></div>
    </div>

    <!-- Summary -->
    <div class="feature-box">
        <label>Summarize a Paragraph:</label>
        <input type="text" id="summaryText" placeholder="Paste your content here..." onkeypress="if(event.key==='Enter') handleFormSubmit('/summarize/', 'summaryText', 'summaryResult', 'summary', 'POST', 'text')">
        <button onclick="handleFormSubmit('/summarize/', 'summaryText', 'summaryResult', 'summary', 'POST', 'text')">Summarize</button>
        <div id="summaryResult" class="output"></div>
    </div>

    <!-- Quiz -->
    <div class="feature-box">
        <label>Generate a Quiz:</label>
        <input type="text" id="quizText" placeholder="E.g., Solar System" onkeypress="if(event.key==='Enter') handleFormSubmit('/quiz', 'quizText', 'quizResult', 'quiz', 'POST', 'text')">
        <button onclick="handleFormSubmit('/quiz', 'quizText', 'quizResult', 'quiz', 'POST', 'text')">Generate Quiz</button>
        <div id="quizResult" class="output"></div>
    </div>

    <!-- Learning Path -->
    <div class="feature-box">
        <label>Personalized Learning Path:</label>
        <input type="text" id="learnTopic" placeholder="E.g., Machine Learning" onkeypress="if(event.key==='Enter') handleFormSubmit('/learn/recommendations?topic=', 'learnTopic', 'learnResult', 'recommendation', 'GET')">
        <button onclick="handleFormSubmit('/learn/recommendations?topic=', 'learnTopic', 'learnResult', 'recommendation', 'GET')">Get Recommendations</button>
        <div id="learnResult" class="output"></div>
    </div>
</div>

<script>
    async function handleFormSubmit(urlBase, inputId, resultId, responseKey, method, payloadKey=null) {
        const inputVal = document.getElementById(inputId).value;
        const resultDiv = document.getElementById(resultId);
        resultDiv.style.display = "block";
        resultDiv.innerText = "Processing...";

        try {
            let response;
            if (method === 'GET') {
                response = await fetch(urlBase + encodeURIComponent(inputVal));
            } else {
                const bodyData = {}; bodyData[payloadKey] = inputVal;
                response = await fetch(urlBase, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bodyData)
                });
            }
            const data = await response.json();
            resultDiv.innerText = data[responseKey] || data.error || "Done!";
        } catch (e) { resultDiv.innerText = "Error!"; }
    }
</script>
</body>
</html>
