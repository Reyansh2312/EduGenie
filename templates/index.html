<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenie</title>
    <!-- CSS File Link -->
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .quiz-item { margin-bottom: 20px; padding: 15px; border: 1px solid #444; border-radius: 8px; background-color: #2d2d2d;}
        .check-btn { margin-top: 10px; background: #569cd6; border: none; padding: 5px 10px; color: white; border-radius: 4px; cursor: pointer; }
        .check-btn:hover { background: #1177bb; }
    </style>
</head>
<body>
    <h1>Welcome to EduGenie 🧠✨</h1>
    <p>Your personal AI tutor for learning support!</p>

    <!-- Q&A -->
    <form id="qaForm" onsubmit="handleFormSubmit(event, '/qa?question=', 'question', 'qaResult', 'answer', 'GET')">
        <label><strong>Ask EduGenie a Question:</strong></label><br><br>
        <input type="text" id="question" placeholder="Why is the sky blue?" required>
        <button type="submit">Get Answer</button>
    </form>
    <div id="qaResult" class="output"></div>

    <!-- Explanation -->
    <form id="explainForm" onsubmit="handleFormSubmit(event, '/explain/', 'topic', 'explanationResult', 'explanation', 'POST', 'topic')">
        <label><strong>Need an Explanation?</strong></label><br><br>
        <input type="text" id="topic" placeholder="Photosynthesis" required>
        <button type="submit">Explain</button>
    </form>
    <div id="explanationResult" class="output"></div>

    <!-- Summary -->
    <form id="summaryForm" onsubmit="handleFormSubmit(event, '/summarize/', 'summaryText', 'summaryResult', 'summary', 'POST', 'text')">
        <label><strong>Summarize a Paragraph:</strong></label><br><br>
        <input type="text" id="summaryText" placeholder="Paste long content to summarize" required>
        <button type="submit">Summarize</button>
    </form>
    <div id="summaryResult" class="output"></div>

    <!-- Quiz -->
    <form id="quizForm" onsubmit="handleQuizSubmit(event)">
        <label><strong>Generate a Quiz:</strong></label><br><br>
        <input type="text" id="quizText" placeholder="Solar System" required>
        <button type="submit">Generate Quiz</button>
    </form>
    <div id="quizResult" class="output"></div>

    <!-- Learning Recommendations -->
    <form id="learnForm" onsubmit="handleFormSubmit(event, '/learn/recommendations?topic=', 'learnTopic', 'learnResult', 'recommendation', 'GET')">
        <label><strong>Personalized Learning Path:</strong></label><br><br>
        <input type="text" id="learnTopic" placeholder="Machine Learning" required>
        <button type="submit">Get Recommendations</button>
    </form>
    <div id="learnResult" class="output"></div>

    <script>
        // Universal function for QnA, Explain, Summary, and Learning Path
        async function handleFormSubmit(event, urlBase, inputId, resultId, responseKey, method, payloadKey=null) {
            event.preventDefault();
            const inputVal = document.getElementById(inputId).value;
            const resultDiv = document.getElementById(resultId);
            
            resultDiv.style.display = "block";
            resultDiv.innerText = "⏳ Processing...";

            try {
                let response;
                if (method === 'GET') {
                    response = await fetch(urlBase + encodeURIComponent(inputVal));
                } else {
                    const bodyData = {};
                    bodyData[payloadKey] = inputVal;
                    response = await fetch(urlBase, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(bodyData)
                    });
                }
                const data = await response.json();
                resultDiv.innerText = data[responseKey] || data.error || "Done!";
            } catch (error) {
                resultDiv.innerText = "⚠️ Error: " + error;
            }
        }

        // Dedicated function for Interactive Quiz
        async function handleQuizSubmit(event) {
            event.preventDefault();
            const inputVal = document.getElementById("quizText").value;
            const resultDiv = document.getElementById("quizResult");
            
            resultDiv.style.display = "block";
            resultDiv.innerText = "⏳ MCQs bana raha hu...";

            try {
                const response = await fetch("/quiz", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: inputVal })
                });
                const data = await response.json();
                
                if (data.quiz && Array.isArray(data.quiz)) {
                    let htmlOutput = "<h3>Test Your Knowledge:</h3>";
                    data.quiz.forEach((q, index) => {
                        htmlOutput += `<div class="quiz-item">
                            <p><strong>Q${index + 1}: ${q.question}</strong></p>`;
                        if(q.options) {
                            q.options.forEach(opt => {
                                const safeOpt = opt.replace(/"/g, '&quot;');
                                htmlOutput += `<input type="radio" name="q${index}" value="${safeOpt}"> ${opt}<br>`;
                            });
                        }
                        const safeAnswer = q.answer.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        htmlOutput += `<br><button type="button" class="check-btn" onclick="checkAnswer(${index}, '${safeAnswer}')">Check Answer</button>
                                       <div id="result-q${index}" style="margin-top:10px;"></div></div>`;
                    });
                    resultDiv.innerHTML = htmlOutput;
                } else {
                    resultDiv.innerText = data.error || "Quiz generation failed.";
                }
            } catch (error) {
                resultDiv.innerText = "⚠️ Error: " + error;
            }
        }

        // Function to check the answer
        function checkAnswer(index, correctAnswer) {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const resultDiv = document.getElementById(`result-q${index}`);
            
            if (!selected) { alert("Pehle koi option select karo!"); return; }
            
            if (selected.value === correctAnswer) {
                resultDiv.innerHTML = "<span style='color:#4caf50;'>✅ Correct!</span>";
            } else {
                resultDiv.innerHTML = `<span style='color:#f44336;'>❌ Incorrect! Correct answer: ${correctAnswer}</span>`;
            }
        }
    </script>
</body>
</html>
