<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="wlj4c27-VTbIi5gPBvwxxMaPy44ZK2ee4WzVsgxkSxc" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenie | Smart Tutor</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 40px 20px; margin: 0; }
        .container { max-width: 800px; margin: auto; }
        h1 { color: #ffffff; text-align: center; }
        .feature-box { background: #1e1e1e; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        label { font-weight: bold; color: #bb86fc; display: block; margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 12px; background: #2c2c2c; border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; }
        button { background: #bb86fc; color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #9965f4; }
        .output { margin-top: 15px; padding: 15px; background: #000; border-radius: 6px; display: none; border-left: 4px solid #bb86fc; min-height: 20px; }
        .quiz-item { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #333; }
        /* Alignment Fix */
        .quiz-option { display: flex; align-items: center; gap: 10px; margin: 5px 0; cursor: pointer; }
        .quiz-option input { width: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to EduGenie 🧠✨</h1>
    
    <!-- Q&A -->
    <div class="feature-box">
        <label>Ask EduGenie a Question:</label>
        <input type="text" id="question" placeholder="Why is the sky blue?" onkeypress="if(event.key==='Enter') handleFormSubmit('/qa?question=', 'question', 'qaResult', 'answer', 'GET')">
        <button onclick="handleFormSubmit('/qa?question=', 'question', 'qaResult', 'answer', 'GET')">Get Answer</button>
        <div id="qaResult" class="output"></div>
    </div>

    <!-- Explanation -->
    <div class="feature-box">
        <label>Need an Explanation?</label>
        <input type="text" id="topic" placeholder="Photosynthesis" onkeypress="if(event.key==='Enter') handleFormSubmit('/explain/', 'topic', 'explanationResult', 'explanation', 'POST', 'topic')">
        <button onclick="handleFormSubmit('/explain/', 'topic', 'explanationResult', 'explanation', 'POST', 'topic')">Explain</button>
        <div id="explanationResult" class="output"></div>
    </div>

    <!-- Summary -->
    <div class="feature-box">
        <label>Summarize a Paragraph:</label>
        <input type="text" id="summaryText" placeholder="Paste content to summarize" onkeypress="if(event.key==='Enter') handleFormSubmit('/summarize/', 'summaryText', 'summaryResult', 'summary', 'POST', 'text')">
        <button onclick="handleFormSubmit('/summarize/', 'summaryText', 'summaryResult', 'summary', 'POST', 'text')">Summarize</button>
        <div id="summaryResult" class="output"></div>
    </div>

    <!-- Quiz -->
    <div class="feature-box">
        <label>Generate a Quiz:</label>
        <input type="text" id="quizText" placeholder="Solar System" onkeypress="if(event.key==='Enter') generateQuiz()">
        <button onclick="generateQuiz()">Generate Quiz</button>
        <div id="quizResult" class="output"></div>
    </div>

    <!-- Learning Path -->
    <div class="feature-box">
        <label>Personalized Learning Path:</label>
        <input type="text" id="learnTopic" placeholder="Machine Learning" onkeypress="if(event.key==='Enter') handleFormSubmit('/learn/recommendations?topic=', 'learnTopic', 'learnResult', 'recommendation', 'GET')">
        <button onclick="handleFormSubmit('/learn/recommendations?topic=', 'learnTopic', 'learnResult', 'recommendation', 'GET')">Get Recommendations</button>
        <div id="learnResult" class="output"></div>
    </div>
</div>

<script>
    async function handleFormSubmit(urlBase, inputId, resultId, responseKey, method, payloadKey=null) {
        const inputVal = document.getElementById(inputId).value;
        const resultDiv = document.getElementById(resultId);
        resultDiv.style.display = "block";
        resultDiv.innerText = "Processing...";
        try {
            let response;
            if (method === 'GET') response = await fetch(urlBase + encodeURIComponent(inputVal));
            else {
                const bodyData = {}; bodyData[payloadKey] = inputVal;
                response = await fetch(urlBase, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(bodyData) });
            }
            const data = await response.json();
            resultDiv.innerText = data[responseKey] || data.error || "Done!";
        } catch (e) { resultDiv.innerText = "Error!"; }
    }

    async function generateQuiz() {
        const inputVal = document.getElementById("quizText").value;
        const resultDiv = document.getElementById("quizResult");
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "⏳ Generating...";
        const response = await fetch("/quiz", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text: inputVal }) });
        const data = await response.json();
        if (data.quiz && Array.isArray(data.quiz)) {
            let html = "<h3>Test your knowledge:</h3>";
            data.quiz.forEach((q, i) => {
                html += `<div class="quiz-item"><p><strong>Q${i+1}: ${q.question}</strong></p>`;
                q.options.forEach(opt => {
                    html += `<label class="quiz-option"><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
                });
                html += `<button onclick="checkAns(${i}, '${q.answer}')">Check</button><div id="r${i}"></div></div>`;
            });
            resultDiv.innerHTML = html;
        } else resultDiv.innerText = "Error loading quiz.";
    }

    function checkAns(i, correct) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const res = document.getElementById(`r${i}`);
        if(selected && selected.value === correct) res.innerHTML = "<b style='color:green'>✅ Correct!</b>";
        else res.innerHTML = `<b style='color:red'>❌ Incorrect! Answer: ${correct}</b>`;
    }
</script>
</body>
</html>
